<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO -->
    <title>Heryze — Caisse enregistreuse nouvelle génération</title>
    <meta name="description" content="Heryze : la caisse enregistreuse SaaS moderne, offline-first, avec scanner WebRTC. Idéale pour TPE/PME : restauration, retail, beauté, services." />
    <meta name="keywords" content="caisse enregistreuse, POS, SaaS, TPE, PME, offline, WebRTC, scanner, encaissement, Heryze" />
    <meta name="author" content="Heryze" />

    <!-- Open Graph / Réseaux sociaux -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Heryze — Caisse enregistreuse sans compromis" />
    <meta property="og:description" content="Transformez votre smartphone en douchette ultra-rapide. Encaissez vos clients même sans connexion." />
    <meta property="og:url" content="https://heryze.fr" />

    <!-- PWA -->
    <meta name="theme-color" content="#0055ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Heryze" />
    <!-- Icône iOS (nécessaire pour "Ajouter à l'écran d'accueil" sur Safari/iPhone) -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <!-- Restauration de l'URL après la redirection 404 de GitHub Pages (SPA trick) -->
    <script>
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>

    <!-- QR Code Scanner -->
    <script
      src="https://unpkg.com/html5-qrcode"
      type="text/javascript"
    ></script>
  </head>

  <body>
    <div id="root">
      <div
        style="
          height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #1a1a1a;
          color: white;
          font-family: sans-serif;
          flex-direction: column;
          text-align: center;
          padding: 20px;
        "
      >
        <div
          id="loading-spinner"
          style="
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top: 4px solid #00bfff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
          "
        ></div>
        <p id="loading-text" style="margin-top: 20px; color: #999">
          Chargement de l'application...
        </p>
        <div
          id="troubleshoot"
          style="
            display: none;
            margin-top: 30px;
            font-size: 14px;
            color: #e74c3c;
            line-height: 1.6;
          "
        >
          Le chargement semble long.<br />
          Vérifiez que votre appareil est bien sur le
          <strong>même Wi-Fi</strong> que le PC.<br />
          IP du PC :
          <span id="suggested-ip" style="font-weight: bold; color: white"
            >...</span
          >
        </div>
        <script>
          setTimeout(() => {
            const t = document.getElementById("troubleshoot");
            const sip = document.getElementById("suggested-ip");
            if (t) t.style.display = "block";
            if (sip) sip.innerText = window.location.hostname;
          }, 20000);
        </script>
        <style>
          @keyframes spin {
            0% {
              transform: rotate(0deg);
            }

            100% {
              transform: rotate(360deg);
            }
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
