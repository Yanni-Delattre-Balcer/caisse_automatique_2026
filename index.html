<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caisse</title>
    <script
      src="https://unpkg.com/html5-qrcode"
      type="text/javascript"
    ></script>
  </head>

  <body>
    <div id="root">
      <div
        style="
          height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #1a1a1a;
          color: white;
          font-family: sans-serif;
          flex-direction: column;
          text-align: center;
          padding: 20px;
        "
      >
        <!-- Titre retiré -->
        <div
          id="loading-spinner"
          style="
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top: 4px solid #00bfff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
          "
        ></div>
        <p id="loading-text" style="margin-top: 20px; color: #999">
          Chargement de l'application...
        </p>
        <div
          id="troubleshoot"
          style="
            display: none;
            margin-top: 30px;
            font-size: 14px;
            color: #e74c3c;
            line-height: 1.6;
          "
        >
          ⚠️ Le chargement semble long.<br />
          Vérifiez que votre téléphone est bien sur le
          <strong>même Wi-Fi</strong> que le PC.<br />
          IP du PC suggérée:
          <span id="suggested-ip" style="font-weight: bold; color: white"
            >...</span
          >
        </div>
        <script>
          setTimeout(() => {
            const t = document.getElementById("troubleshoot");
            const sip = document.getElementById("suggested-ip");
            if (t) t.style.display = "block";
            if (sip) sip.innerText = window.location.hostname;
          }, 20000);
        </script>
        <style>
          @keyframes spin {
            0% {
              transform: rotate(0deg);
            }

            100% {
              transform: rotate(360deg);
            }
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
